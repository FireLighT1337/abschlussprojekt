name: Azure-Static-Web-Apps-CI/CD

pr:
  branches:
    include:
      - main
trigger:
  branches:
    include:
      - main

jobs:
  - job: build_and_deploy_job
    displayName: Build and Deploy Job
    condition: or(eq(variables['Build.Reason'], 'Manual'),or(eq(variables['Build.Reason'], 'PullRequest'),eq(variables['Build.Reason'], 'IndividualCI')))
    pool:
      vmImage: ubuntu-latest
    variables:
      - group: Azure-Static-Web-Apps-ambitious-sea-03e2a0803-variable-group
    steps:
      - checkout: self
        submodules: true
      - task: AzureStaticWebApp@0
        inputs:
          azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_SEA_03E2A0803)
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "chatbot/" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "build" # Built app content directory - optional
        ###### End of Repository/Build Configurations ######
        env:
          REACT_APP_AZURE_CLIENT_ID: $(REACT_APP_AZURE_CLIENT_ID)
          REACT_APP_AZURE_AUTHORITY: $(REACT_APP_AZURE_AUTHORITY)
          REACT_APP_AZURE_SCOPE: $(REACT_APP_AZURE_SCOPE)
          REACT_APP_API_BASE: $(REACT_APP_API_BASE)
          REACT_APP_WS_PATH: $(REACT_APP_WS_PATH)
